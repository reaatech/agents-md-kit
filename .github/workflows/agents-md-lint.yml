name: Agents.md Self-Lint

on:
  pull_request:
    paths:
      - 'examples/**/*.md'
      - 'skills/**/*.md'
      - 'AGENTS.md'

jobs:
  self-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint own AGENTS.md
        run: pnpm exec agents-md-kit lint AGENTS.md

      - name: Lint examples
        run: pnpm exec agents-md-kit lint examples/

      - name: Validate own AGENTS.md (strict)
        run: pnpm exec agents-md-kit validate AGENTS.md
